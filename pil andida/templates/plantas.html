<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantas y Bodegas - PIL Andina</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/estilos_premium_pil.css') }}">
</head>
<body>
    <div id="dashboard-layout">
        <aside id="sidebar">...</aside>
        <main id="main-content">
            <h2>🏭 Infraestructura: Plantas y Bodegas</h2>
            <hr>
            <section class="form-section">
                <h3>Asignar Nueva Bodega a Planta</h3>
                <form action="/bodegas/guardar" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Planta:</label>
                            <select name="planta_id" required>
                                <option value="1">La Paz - Mecapaca</option>
                                <option value="2">Cochabamba - Sacaba</option>
                                <option value="3">Santa Cruz - Palmasola</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tipo de Bodega:</label>
                            <select name="tipo_bodega" required>
                                <option value="Producto Terminado">Producto Terminado</option>
                                <option value="Insumos">Insumos</option>
                                <option value="Refrigerado">Refrigerado</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Capacidad Máxima:</label>
                            <input type="number" name="capacidad" placeholder="Ej: 5000" required>
                        </div>
                        <div class="form-group">
                            <label>Temperatura (°C):</label>
                            <input type="number" step="0.1" name="temperatura" placeholder="Ej: 4.5">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Ubicación Física:</label>
                        <input type="text" name="ubicacion_fisica" placeholder="Ej: Bloque B - Pasillo 4">
                    </div>
                    <button type="submit" class="btn-success">Registrar Bodega</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
