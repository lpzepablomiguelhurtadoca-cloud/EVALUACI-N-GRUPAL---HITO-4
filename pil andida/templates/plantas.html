<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantas y Bodegas - PIL Andina</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/estilos_premium_pil.css') }}">
</head>
</head>
<body>
    <div id="dashboard-layout">
        <main id="main-content">
            <h2>🏭 Infraestructura: Plantas y Bodegas de Almacenamiento</h2>
            <hr>

            <section class="form-section">
                <h3>Asignar Nueva Bodega a Planta</h3>
                <form action="/bodegas/guardar" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="planta_id">Planta Industrial:</label>
                            <select id="planta_id" name="planta_id" required>
                                <option value="1">La Paz - Planta Mecapaca</option>
                                <option value="2">Cochabamba - Planta Sacaba</option>
                                <option value="3">Santa Cruz - Planta Palmasola</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="tipo_bodega">Tipo de Bodega:</label>
                            <select id="tipo_bodega" name="tipo_bodega" required>
                                <option value="Producto Terminado">Producto Terminado (Listo para despacho)</option>
                                <option value="Insumos">Insumos y Materia Prima</option>
                                <option value="Refrigerado">Almacenamiento Refrigerado</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="capacidad">Capacidad Máxima (Cajas/Pallets):</label>
                            <input type="number" id="capacidad" name="capacidad" placeholder="Ej: 5000" required>
                        </div>
                        <div class="form-group">
                            <label for="temperatura">Temperatura Controlada (°C):</label>
                            <input type="number" id="temperatura" name="temperatura" step="0.1" placeholder="Ej: 4.5">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="ubicacion_fisica">Ubicación Física / Pasillo Interno:</label>
                        <input type="text" id="ubicacion_fisica" name="ubicacion_fisica" placeholder="Ej: Bloque B - Pasillo 4">
                    </div>

                    <button type="submit" class="btn-success">Registrar Bodega</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
